name: CI (Remote Build & Lint)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # 🚀 핵심: 모든 앱의 타입체크, 린트, 빌드를 한 번에 병렬 실행
      - name: Verify and Build All Apps
        run: pnpm turbo run type-check lint build
